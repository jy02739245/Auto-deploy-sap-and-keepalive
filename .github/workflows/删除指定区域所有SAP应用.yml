name: 删除指定区域所有SAP应用

on:
  workflow_dispatch:  # 手动触发
    inputs:
      region:
        description: '选择要删除应用的区域 (SG 或 US)'
        required: true
        default: 'SG'
        type: choice
        options:
          - SG
          - US
      confirmation:
        description: '请输入 "确认删除" 以确认操作'
        required: true
        type: string
  repository_dispatch:  # 远程触发
    types: [delete-sap-apps]

jobs:
  delete-apps:
    runs-on: ubuntu-latest
    name: Delete Apps from ${{ github.event.inputs.region || github.event.client_payload.region }}
    
    steps:
    - name: 验证确认短语
      run: |
        CONFIRMATION="${{ github.event.inputs.confirmation || github.event.client_payload.confirmation }}"
        if [ "$CONFIRMATION" != "确认删除" ]; then
          echo "错误：必须输入 '确认删除' 来确认操作"
          exit 1
        fi

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install CF CLI
      run: |
        wget -q -O - https://packages.cloudfoundry.org/debian/cli.cloudfoundry.org.key | sudo apt-key add -
        echo "deb https://packages.cloudfoundry.org/debian stable main" | sudo tee /etc/apt/sources.list.d/cloudfoundry-cli.list
        sudo apt-get update
        sudo apt-get install -y cf8-cli

    - name: 设置区域相关变量
      run: |
        REGION="${{ github.event.inputs.region || github.event.client_payload.region }}"
        if [ "$REGION" = "SG" ]; then
          echo "CF_API=https://api.cf.ap21.hana.ondemand.com" >> $GITHUB_ENV
          echo "CF_ORG=${{ secrets.SG_ORG }}" >> $GITHUB_ENV
          echo "使用新加坡(SG)区域"
        else
          echo "CF_API=https://api.cf.us10-001.hana.ondemand.com" >> $GITHUB_ENV
          echo "CF_ORG=${{ secrets.US_ORG }}" >> $GITHUB_ENV
          echo "使用美国(US)区域"
        fi
        echo "REGION=$REGION" >> $GITHUB_ENV

    - name: Login to Cloud Foundry
      run: |
        cf login -a ${{ env.CF_API }} -u "${{ secrets.EMAIL }}" -p "${{ secrets.PASSWORD }}" -o "${{ env.CF_ORG }}" -s "${{ secrets.SPACE }}"

    - name: 获取所有应用
      id: get-apps
      run: |
        apps=$(cf apps | awk 'NR>3 {print $1}' | grep -v '^$')
        echo "发现的应用:"
        echo "$apps"
        
        if [ -z "$apps" ]; then
          echo "在区域 $REGION 中未找到任何应用"
          echo "has_apps=false" >> $GITHUB_OUTPUT
          exit 0
        else
          echo "has_apps=true" >> $GITHUB_OUTPUT
        fi

        echo "apps<<EOF" >> $GITHUB_OUTPUT
        echo "$apps" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: 删除所有应用
      if: steps.get-apps.outputs.has_apps == 'true'
      run: |
        apps="${{ steps.get-apps.outputs.apps }}"
        
        echo "正在删除区域 $REGION 中的应用:"
        echo "$apps"
        
        for app in $apps; do
          echo "正在删除应用: $app"
          cf delete -f -r "$app"
          echo "应用 $app 删除成功"
          echo "----------------------------------------"
          sleep 10
        done

    - name: 验证应用已删除
      run: |
        echo "区域 $REGION 中剩余的应用:"
        cf apps
