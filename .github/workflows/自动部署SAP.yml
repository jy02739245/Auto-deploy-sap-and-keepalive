name: 自动部署 SAP

on:
  workflow_dispatch:  # 手动触发
    inputs:
      environment:
        description: '选择部署环境'
        required: true
        default: 'production'
        type: choice
        options:
          - staging
          - production
      region:
        description: '选择部署区域'
        required: true
        default: 'SG'
        type: choice
        options:
          - SG
          - US
      app_name:
        description: '应用名称（可选，留空则自动生成）'
        required: false
        default: ''
  repository_dispatch:  # 远程触发
    types: [deploy-sap]

env:
  DOCKER_IMAGE: ghcr.io/eooce/nodejs:main
  MEMORY: 512M

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Determine parameters
      id: params
      run: |
        # 优先读取 workflow_dispatch 参数，再读取 repository_dispatch 参数
        ENVIRONMENT="${{ github.event.inputs.environment || github.event.client_payload.environment || 'production' }}"
        REGION="${{ github.event.inputs.region || github.event.client_payload.region || 'SG' }}"
        APP_NAME_INPUT="${{ github.event.inputs.app_name || github.event.client_payload.app_name || '' }}"

        # 设置 API 端点和默认应用名
        if [ "$REGION" = "SG" ]; then
          CF_API="https://api.cf.ap21.hana.ondemand.com"
          RANDOM_STR=$(head /dev/urandom | tr -dc 'a-z' | head -c 6)
          DEFAULT_APP_NAME="sg$RANDOM_STR"
        elif [ "$REGION" = "US" ]; then
          CF_API="https://api.cf.us10-001.hana.ondemand.com"
          RANDOM_STR=$(head /dev/urandom | tr -dc 'a-z' | head -c 6)
          DEFAULT_APP_NAME="us$RANDOM_STR"
        fi

        # 确定最终应用名
        if [ -n "$APP_NAME_INPUT" ]; then
          APP_NAME="$APP_NAME_INPUT"
        else
          APP_NAME="$DEFAULT_APP_NAME"
        fi

        echo "CF_API=$CF_API" >> $GITHUB_ENV
        echo "ENVIRONMENT=$ENVIRONMENT" >> $GITHUB_ENV
        echo "REGION=$REGION" >> $GITHUB_ENV
        echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV

        echo "使用参数:"
        echo "  Environment: $ENVIRONMENT"
        echo "  Region: $REGION"
        echo "  App Name: $APP_NAME"
        echo "  CF API: $CF_API"

    - name: Install CF CLI
      run: |
        wget -q -O - https://packages.cloudfoundry.org/debian/cli.cloudfoundry.org.key | sudo apt-key add -
        echo "deb https://packages.cloudfoundry.org/debian stable main" | sudo tee /etc/apt/sources.list.d/cloudfoundry-cli.list
        sudo apt-get update
        sudo apt-get install -y cf8-cli

    - name: Login to Cloud Foundry
      run: |
        if [ "$REGION" = "SG" ]; then
          cf login -a $CF_API -u "${{ secrets.EMAIL }}" -p "${{ secrets.PASSWORD }}" -o "${{ secrets.SG_ORG }}" -s "${{ secrets.SPACE }}"
        elif [ "$REGION" = "US" ]; then
          cf login -a $CF_API -u "${{ secrets.EMAIL }}" -p "${{ secrets.PASSWORD }}" -o "${{ secrets.US_ORG }}" -s "${{ secrets.SPACE }}"
        fi

    - name: Deploy application
      run: |
        cf push $APP_NAME --docker-image $DOCKER_IMAGE -m $MEMORY --health-check-type port

    - name: Set environment variables
      run: |
        cf set-env $APP_NAME NAME "SAP" 
        cf set-env $APP_NAME NEZHA_SERVER "${{ secrets.NEZHA_SERVER }}"
        cf set-env $APP_NAME NEZHA_PORT "${{ secrets.NEZHA_PORT }}"
        cf set-env $APP_NAME NEZHA_KEY "${{ secrets.NEZHA_KEY }}"

        if [ "$REGION" = "SG" ]; then
           cf set-env $APP_NAME UUID "${{ secrets.SG_UUID }}"
           cf set-env $APP_NAME ARGO_DOMAIN "${{ secrets.SG_ARGO_DOMAIN }}"
           cf set-env $APP_NAME ARGO_AUTH "${{ secrets.SG_ARGO_AUTH }}"
        elif [ "$REGION" = "US" ]; then
           cf set-env $APP_NAME UUID "${{ secrets.US_UUID }}"
           cf set-env $APP_NAME ARGO_DOMAIN "${{ secrets.US_ARGO_DOMAIN }}"
           cf set-env $APP_NAME ARGO_AUTH "${{ secrets.US_ARGO_AUTH }}"
        fi

        cf set-env $APP_NAME SUB_PATH "${{ secrets.SUB_PATH }}"
        cf set-env $APP_NAME CFIP "${{ secrets.CFIP }}"
        cf set-env $APP_NAME CFPORT "${{ secrets.CFPORT }}"
        cf set-env $APP_NAME CHAT_ID "${{ secrets.CHAT_ID }}"
        cf set-env $APP_NAME BOT_TOKEN "${{ secrets.BOT_TOKEN }}"

        if [ -f .env ]; then
          while IFS= read -r line; do
            if [[ ! "$line" =~ ^# ]] && [[ -n "$line" ]]; then
              IFS='=' read -r key value <<< "$line"
              cf set-env $APP_NAME "$key" "$value"
            fi
          done < .env
        fi

    - name: Restage application
      run: |
        cf restage $APP_NAME

    - name: Verify deployment
      run: |
        cf app $APP_NAME
        echo "Deployment completed successfully!"
